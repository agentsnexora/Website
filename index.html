    <style type="text/tailwindcss">
    @layer theme {
        :root {
            /* Watery/Glass Theme */
            --bg-dark: #050505;
            --glass-surface: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --water-accent: #a5f3fc;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
        }
    }

    @layer base {
        body {
            @apply bg-[var(--bg-dark)] text-[var(--text-primary)] font-['Manrope'] overflow-x-hidden;
        }
        h1, h2, h3, h4, h5, h6 {
            @apply font-['Syncopate'];
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
    }

    @layer components {
        .section-snap {
            @apply snap-start snap-always h-auto min-h-screen flex flex-col justify-center relative;
        }
        .glass-panel {
            @apply bg-[var(--glass-surface)] backdrop-blur-2xl border border-[var(--glass-border)] shadow-2xl transition-all duration-500;
        }
        .watery-card {
            @apply relative overflow-hidden rounded-2xl border border-white/5 bg-white/5 backdrop-blur-xl transition-all duration-500;
        }
        .watery-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(255,255,255,0.06), transparent 40%);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .watery-card:hover::before {
            opacity: 1;
        }
        .watery-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -20px rgba(165, 243, 252, 0.1);
            border-color: rgba(255,255,255,0.2);
        }
        .btn-water {
            @apply relative overflow-hidden bg-white/5 border border-white/10 px-8 py-4 font-bold uppercase tracking-widest text-xs transition-all duration-300 hover:bg-white hover:text-black hover:scale-105;
        }
        .scroll-reveal {
            opacity: 0;
            transform: translateY(100px) scale(0.95);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .scroll-reveal.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .btn-primary {
            @apply relative overflow-hidden bg-transparent border border-[var(--water-accent)] text-[var(--water-accent)] px-8 py-3 font-bold uppercase tracking-wider transition-all duration-300 hover:bg-[var(--water-accent)] hover:text-black;
        }
    }
    </style>
</head>
